services:
  mongo1:
    image: mongo:8
    container_name: mongo1
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo1_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo-init:
    image: mongo:8
    container_name: mongo-init
    depends_on:
      mongo1:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - mongosh
      - --host
      - mongo1:27017
      - --eval
      - |
        rs.initiate({
          _id: "rs0",
          members: [{ _id: 0, host: "mongo1:27017" }]
        })

volumes:
  mongo1_data: